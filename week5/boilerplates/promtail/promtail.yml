server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Promtail находит контейнеры через docker socket и шлёт их stdout в Loki.
# В docker-compose монтируй сокет: volumes: - /var/run/docker.sock:/var/run/docker.sock
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
