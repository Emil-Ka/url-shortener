version: v2

# clean: удаляет ранее сгенерированный код перед новой генерацией.
clean: true

# Плагины ищутся в $PATH (ставятся через `go install`, см. Шаг 0).
# out — куда складывать код, относительно этой папки (shared/proto).
plugins:
  - local: protoc-gen-go
    out: ../pkg/proto
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../pkg/proto
    opt:
      - paths=source_relative
